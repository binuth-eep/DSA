<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Hunter - Player Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 340px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 1px 1px 5px #000;
        }

        img {
            border-radius: 50%;
            width: 100px;
            height: 100px;
            display: block;
            margin: 0 auto 15px auto;
            border: 3px solid #ffd700;
            object-fit: cover;
        }

        input {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 8px #ffd700;
        }

        input[disabled] {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        button {
            margin: 10px 5px;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        #updateProfileBtn {
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
            color: #fff;
        }

        #updateProfileBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 65, 108, 0.6);
        }

        #logoutBtn {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: #fff;
        }

        #logoutBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(42, 82, 152, 0.6);
        }

        #statusMsg {
            margin-top: 15px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
        }

        @media(max-width: 400px) {
            .profile-card {
                width: 90%;
                padding: 20px;
            }

            input,
            button {
                width: 100%;
                margin: 8px 0;
            }
        }
    </style>
</head>

<body>

    <div class="profile-card">
        <h2>Player Profile</h2>
        <img id="userIcon" src="https://i.pravatar.cc/100" alt="Avatar">
        <p id="userEmail">Email: </p>

        <input type="text" id="fullName" placeholder="Full Name">
        <input type="number" id="age" placeholder="Age">
        <input type="text" id="photoURL" placeholder="Avatar URL">
        <input type="number" id="highScore" placeholder="High Score" disabled>

        <button id="updateProfileBtn">Update Profile</button>
        <button id="logoutBtn">Logout</button>
        <button style="width:60px;display: flex;justify-content: center; height:40px; border:2px solid var(--primary); 
            position:absolute; top:15px; right:15px; cursor:pointer;" title="Go to Profile"
            onclick="window.location.href='./Game/indexx.html'">Game</button>

    </div>

    <p id="statusMsg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


        const firebaseConfig = {
            apiKey: "AIzaSyAwlreWuC1b3PZAfJqGQsOKCRkiIxdBSJs",
            authDomain: "brick-hunter.firebaseapp.com",
            projectId: "brick-hunter",
            storageBucket: "brick-hunter.firebasestorage.app",
            messagingSenderId: "517121888892",
            appId: "1:517121888892:web:3f512a40f655f808676ff9",
            measurementId: "G-6RDV49WMK8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const userEmail = document.getElementById("userEmail");
        const userIcon = document.getElementById("userIcon");
        const fullNameInput = document.getElementById("fullName");
        const ageInput = document.getElementById("age");
        const photoURLInput = document.getElementById("photoURL");
        const highScoreInput = document.getElementById("highScore");
        const statusMsg = document.getElementById("statusMsg");
        const updateProfileBtn = document.getElementById("updateProfileBtn");
        const logoutBtn = document.getElementById("logoutBtn");


        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userEmail.innerText = "Email: " + user.email;
                userIcon.src = user.photoURL || "https://i.pravatar.cc/100";
                fullNameInput.value = user.displayName || "";

                const userDocRef = doc(db, "users", user.uid);
                try {
                    const docSnap = await getDoc(userDocRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        ageInput.value = data.age || "";
                        photoURLInput.value = data.avatarURL || "";
                        highScoreInput.value = data.highScore || 0;
                    } else {
     
                        await setDoc(userDocRef, { highScore: 0 });
                        highScoreInput.value = 0;
                    }
                } catch (err) {

                }
            } else {
                window.location.href = "../../auth.html"; 
            }
        });

     
        updateProfileBtn.onclick = async () => {
            const user = auth.currentUser;
            if (!user) return;

            try {
       
                await updateProfile(user, {
                    displayName: fullNameInput.value,
                    photoURL: photoURLInput.value
                });


                const userDocRef = doc(db, "users", user.uid);
                await setDoc(userDocRef, {
                    fullName: fullNameInput.value,
                    age: ageInput.value,
                    avatarURL: photoURLInput.value || "https://i.pravatar.cc/100",
                    highScore: highScoreInput.value || 0
                }, { merge: true });

                userIcon.src = photoURLInput.value || "https://i.pravatar.cc/100";
                statusMsg.innerText = "Profile updated successfully!";
            } catch (err) {
                statusMsg.innerText = "Update failed: " + err.message;
            }
        };

    
        logoutBtn.onclick = async () => {
            try {
                await signOut(auth);
                window.location.href = "../../auth.html";
            } catch (err) {
                statusMsg.innerText = "Logout failed: " + err.message;
            }
        };
    </script>

</body>

</html>
