<!-- index.html - The main game HTML file -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CIS045-3: Advanced Architectural Game</title>
    <style>
        :root { --primary: #00d2ff; --gift: #ffcc00; --bg: #0b0e14; --panel: rgba(255,255,255,0.05); }
        body { margin: 0; background:#09150b; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #dashboard { width: 700px; display: flex; justify-content: space-between; margin-bottom: 10px; background: var(--panel); padding: 15px; border-radius: 10px; border: 1px solid #333; box-sizing: border-box; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        #game-container { position: relative; width: 700px; height: 500px; background: #000; border: 4px solid #444; border-radius: 12px; overflow: hidden; }
        #ball { position: absolute; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; width: 16px; height: 16px; z-index: 5; }
        #paddle { position: absolute; background: linear-gradient(90deg, var(--primary), #3a7bd5); border-radius: 5px; height: 15px; z-index: 5; }
        .brick { position: absolute; border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; height: 20px; }
        .brick-gift { border: 2px solid var(--gift); box-shadow: 0 0 10px var(--gift); animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(5px); text-align: center; }
        .hidden { display: none !important; }
        button { padding: 12px 25px; margin: 8px; cursor: pointer; background: var(--primary); border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #fff; transform: scale(1.05); }
        input { padding: 10px; width: 80px; text-align: center; font-size: 1.5rem; border-radius: 5px; border: none; margin: 10px; }
        #puzzle-img { width: 260px; border: 3px solid var(--primary); border-radius: 10px; margin: 10px; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="stat-box"><div class="stat-label">Level</div><div class="stat-val" id="ui-lvl">1</div></div>
    <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="ui-score">0</div></div>
    <div class="stat-box"><div class="stat-label">Lives</div><div class="stat-val" id="ui-lives">3</div></div>
    <div class="stat-box"><div class="stat-label">High Score</div><div class="stat-val" id="ui-high">0</div></div>
</div>

<div id="game-container">
    <div id="ball"></div>
    <div id="paddle"></div>
    <div id="bricks-container"></div>

    <div id="screen-menu" class="overlay">
        <h1 style="color:var(--primary); margin-bottom:0;">PRO BREAKER</h1>
        <p id="menu-status">SYSTEM READY</p>
        <button onclick="game.resume()">PLAY / RESUME</button>
        <button onclick="game.toggleSettings()" style="background:#444">SETTINGS</button>
        <button id="logoutBtn">Logout</button>

    </div>

    <div id="screen-settings" class="overlay hidden">
        <h2>ENVIRONMENT SETTINGS</h2>
        <button onclick="game.setTheme(200)">CYBER BLUE</button>
        <button onclick="game.setTheme(0)">EMERGENCY RED</button>
        <button onclick="game.setTheme(120)">MATRIX GREEN</button>
        <button onclick="game.toggleSound()" id="sound-btn">SOUND: ON</button>
        <button onclick="game.toggleSettings()" style="background:#444; margin-top:20px;">BACK</button>
    </div>

    <div id="screen-puzzle" class="overlay hidden">
        <h2 style="color:var(--gift)">SECURITY DECRYPTION</h2>
        <img id="puzzle-img" src="" alt="Loading...">
        <input type="number" id="puzzle-input">
        <div>
            <button onclick="game.verifyPuzzle()">SUBMIT</button>
            <button onclick="game.closePuzzle()" style="background:#444">SKIP</button>
        </div>
    </div>

    <div id="screen-reward" class="overlay hidden">
        <h2 style="color:var(--primary)">CHOOSE UPGRADE</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr;">
            <button onclick="game.applyGift('wide')">Wider Paddle</button>
            <button onclick="game.applyGift('life')">+1 Life</button>
            <button onclick="game.applyGift('slow')">Slow Ball</button>
            <button onclick="game.applyGift('speed')">Paddle Speed</button>
        </div>
    </div>

    <div id="screen-gameover" class="overlay hidden">
        <h2>GAME OVER</h2>
        <p>Your Score: <span id="final-score"></span></p>
        <button onclick="game.restart()" style="background:#444">RESTART</button>
        <button onclick="game.auth.loadLeaderboard()">View Leaderboard</button>
    </div>
</div>


<script src="js/audioManager.js"></script>
<script src="js/ball.js"></script>
<script src="js/paddle.js"></script>
<script src="js/brick.js"></script>
<script src="js/brickManager.js"></script>
<script src="js/dataManager.js"></script>
<script src="js/puzzleService.js"></script>
<script src="js/auth.js"></script>
<script src="js/game.js"></script>
<script type="module" src="js/Logout.js"></script>


</body>
</html>
